name: Daily Repository Update

on:
  schedule:
    - cron: '30 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
          
      - name: Update for 23f2001191@ds.study.iitm.ac.in
        run: |
          git config user.name "DevSync Automation"
          git config user.email "23f2001191@ds.study.iitm.ac.in"
          mkdir -p logs
          echo "Daily update - $(date '+%Y-%m-%d %H:%M:%S UTC')" >> logs/daily-activity.log
          git add .
          git commit -m "chore: automated daily update - $(date '+%Y-%m-%d')"
          git push
